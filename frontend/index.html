<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🔗 URL Shortener</h1>
            <p class="subtitle">Shorten your long URLs instantly</p>
            
            <div class="form-group">
                <input 
                    type="url" 
                    id="urlInput" 
                    placeholder="Enter your long URL here..."
                    required
                >
                <button id="shortenBtn" class="btn">Shorten URL</button>
            </div>

            <div id="result" class="result hidden">
                <div class="result-content">
                    <p class="label">Shortened URL:</p>
                    <div class="result-box">
                        <span id="shortUrl"></span>
                        <button id="copyBtn" class="copy-btn">📋 Copy</button>
                    </div>
                    <p class="label">Original URL:</p>
                    <div class="result-box">
                        <span id="originalUrl"></span>
                    </div>
                    <button id="newBtn" class="btn secondary">Create Another</button>
                </div>
            </div>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Processing...</p>
            </div>

            <div id="error" class="error hidden"></div>

            <div class="stats">
                <p id="statsText">URLs created: 0</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
